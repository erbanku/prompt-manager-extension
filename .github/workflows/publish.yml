name: Publish to Chrome Web Store

# Third-party actions still declare Node 20; opt into the runner Node 24 runtime until they update.
# See https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
    push:
        branches:
            - main
        paths:
            - "src/manifest.json"
    workflow_dispatch:

jobs:
    check:
        name: Check manifest version change
        runs-on: ubuntu-latest
        permissions:
            contents: read
        outputs:
            should_publish: ${{ steps.diff.outputs.changed }}
            version: ${{ steps.diff.outputs.version }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 2

            - name: Detect manifest version change
              id: diff
              run: |
                  VERSION=$(python3 -c 'import json; print(json.load(open("src/manifest.json"))["version"])')
                  echo "version=$VERSION" >> $GITHUB_OUTPUT

                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    echo "changed=true" >> $GITHUB_OUTPUT
                    echo "Manual run: publishing version $VERSION"
                    exit 0
                  fi

                  if ! git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
                    echo "changed=true" >> $GITHUB_OUTPUT
                    echo "No parent commit; publishing version $VERSION"
                    exit 0
                  fi

                  PREV=$(git show HEAD~1:src/manifest.json 2>/dev/null | python3 -c 'import sys, json; print(json.load(sys.stdin)["version"])' 2>/dev/null || true)
                  if [ -z "$PREV" ]; then
                    echo "changed=true" >> $GITHUB_OUTPUT
                    echo "No previous manifest; publishing version $VERSION"
                    exit 0
                  fi

                  if [ "$VERSION" != "$PREV" ]; then
                    echo "changed=true" >> $GITHUB_OUTPUT
                    echo "Version changed: $PREV -> $VERSION"
                  else
                    echo "changed=false" >> $GITHUB_OUTPUT
                    echo "manifest.json updated but version unchanged ($VERSION); skip publish and release"
                  fi

    publish:
        name: Package, publish, and release
        needs: check
        if: needs.check.outputs.should_publish == 'true'
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Zip extension source
              run: |
                  mkdir -p dist
                  cd src
                  zip -r ../dist/extension.zip .
                  cd ..
                  echo "Created dist/extension.zip"

            - name: Upload to Chrome Web Store
              uses: mnao305/chrome-extension-upload@v5.0.0
              with:
                  file-path: dist/extension.zip
                  extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
                  client-id: ${{ secrets.CHROME_CLIENT_ID }}
                  client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
                  refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
                  publish: true

            - name: Create GitHub release
              uses: softprops/action-gh-release@v2.6.1
              with:
                  tag_name: v${{ needs.check.outputs.version }}
                  name: v${{ needs.check.outputs.version }}
                  files: dist/extension.zip
                  generate_release_notes: true
                  target_commitish: ${{ github.sha }}
